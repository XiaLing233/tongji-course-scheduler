services:
  backend:
    build: ./backend
    container_name: xk-backend
    ports:
      - "1239:1239"
    volumes:
      - /tmp:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1239/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"