services:
  mysql:
    image: mysql:8.4
    container_name: xk-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    command: --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./crawler/meta_template.sql:/docker-entrypoint-initdb.d/01_meta.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:8.4-alpine
    container_name: xk-redis
    restart: always

  backend:
    build: ./backend
    container_name: xk-backend
    env_file: .env
    environment:
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1239/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always

  frontend:
    build: ./xkFrontendts
    container_name: xk-frontend
    ports:
      - "1239:80"
    depends_on:
      - backend
    restart: always

  crawler:
    build: ./crawler
    env_file: .env
    environment:
      TZ: Asia/Shanghai
    profiles: ["crawler"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: ["python3", "-u", "fetchCourseList.py"]
    restart: "no"

  # ── 测试服务（独立 MySQL 实例，完全物理隔离）──
  test-mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: test_pass_123
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    command: --default-time-zone=+08:00
    profiles: ["test"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: "no"

  test-backend:
    build: ./backend
    profiles: ["test"]
    environment:
      TZ: Asia/Shanghai
      DB_HOST: test-mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: test_pass_123
      DB_R_USER: root
      DB_R_PASSWORD: test_pass_123
      DB_META: test_course_scheduler_meta
    depends_on:
      test-mysql:
        condition: service_healthy
    entrypoint: ["python3", "-m", "pytest", "/app/tests/", "-v"]
    restart: "no"

  test-crawler:
    build: ./crawler
    profiles: ["test"]
    environment:
      TZ: Asia/Shanghai
      DB_HOST: test-mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: test_pass_123
      DB_R_USER: root
      DB_R_PASSWORD: test_pass_123
      DB_META: test_course_scheduler_meta
    depends_on:
      test-mysql:
        condition: service_healthy
    entrypoint: ["python3", "-m", "pytest", "/app/tests/", "-v"]
    restart: "no"

volumes:
  mysql_data:
