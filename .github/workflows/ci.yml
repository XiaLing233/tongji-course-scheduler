name: CI/CD

on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      crawler: ${{ steps.filter.outputs.crawler }}
      frontend: ${{ steps.filter.outputs.frontend }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            crawler:
              - 'crawler/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'xkFrontendts/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            monitoring:
              - 'monitoring/**'
              - 'docker-compose*.yml'

  backend-test:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend tests
        run: docker compose -f docker-compose.test.yml up --build backend --exit-code-from backend
      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs backend

  crawler-test:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.crawler == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run crawler tests
        run: docker compose -f docker-compose.test.yml up --build crawler --exit-code-from crawler
      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs crawler

  frontend-typecheck:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install & typecheck
        working-directory: xkFrontendts
        run: |
          npm ci
          npm run type-check

  frontend-test:
    needs: [frontend-typecheck, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install & test
        working-directory: xkFrontendts
        run: |
          npm ci
          npm run test

  build-backend:
    needs: [backend-test, detect-changes]
    if: github.ref == 'refs/heads/master' && needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/xk-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha
            type=ref,event=tag
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    needs: [frontend-typecheck, frontend-test, detect-changes]
    if: github.ref == 'refs/heads/master' && needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/xk-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha
            type=ref,event=tag
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./xkFrontendts
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-crawler:
    needs: [crawler-test, detect-changes]
    if: github.ref == 'refs/heads/master' && needs.detect-changes.outputs.crawler == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/xk-crawler
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha
            type=ref,event=tag
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./crawler
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: [build-backend, build-frontend, build-crawler]
    if: github.ref == 'refs/heads/master' && !failure()
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd ~/tongji-course-scheduler/
            git pull
            docker compose -f docker-compose.yml -f docker-compose.monitoring.yml pull
            docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
            docker image prune -f
          EOF
