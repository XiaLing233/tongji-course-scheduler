name: Deploy Shared Pages

on:
  push:
    branches:
      - master
    paths:
      - 'shared_pages/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy shared_pages to server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            shared_pages/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/github_actions_shared_pages/shared_pages/

      - name: Move files and set permissions
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'sudo rm -rf /var/www/shared_pages && \
             sudo mv /tmp/github_actions_shared_pages/shared_pages /var/www/shared_pages && \
             sudo chown -R www-data:www-data /var/www/shared_pages && \
             sudo find /var/www/shared_pages -type d -exec chmod 755 {} \; && \
             sudo find /var/www/shared_pages -type f -exec chmod 644 {} \; && \
             echo "Shared pages deployed successfully"'
