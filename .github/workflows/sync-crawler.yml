name: Sync Crawler

on:
  push:
    branches: [ master ]
    paths:
      - "crawler/**"
      - "crawler/update_courses.sh"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync crawler on server
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd ~/xkB/
            git fetch origin
            git reset --hard origin/master
            echo "Crawler synced successfully"
          EOF
