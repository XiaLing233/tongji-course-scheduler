<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据更新中... - 同济排课助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header a {
            color: white;
            text-decoration: none;
            border-bottom: 1px dashed rgba(255,255,255,0.5);
        }

        .header a:hover {
            border-bottom-style: solid;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 16px;
            color: #495057;
        }

        .terminal {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: "Consolas", "Monaco", "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .terminal-line {
            margin: 2px 0;
        }

        .terminal-line.info {
            color: #9cdcfe;
        }

        .terminal-line.success {
            color: #4ec9b0;
        }

        .terminal-line.error {
            color: #f48771;
        }

        .terminal::-webkit-scrollbar {
            width: 8px;
        }

        .terminal::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .terminal::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 4px;
        }

        .footer {
            padding: 20px;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            background: #f8f9fa;
        }

        .eta {
            margin-top: 10px;
            font-size: 13px;
            color: #868e96;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <a href="https://xk.xialing.icu" target="_blank">同济排课助手</a> &
                <a href="https://tongji.xialing.icu" target="_blank">课程检索</a>
            </h1>
            <p>数据例行更新中，请稍候...</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span class="status-text" id="statusText">正在检查更新状态...</span>
        </div>

        <div class="terminal" id="terminal"></div>

        <div class="footer">
            <p>系统正在获取最新课程数据</p>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');
        // Track how many lines we've received (offset for next request)
        let lineOffset = 0;

        function addLogLine(text) {
            const line = document.createElement('div');
            line.className = 'terminal-line';

            // Color coding based on content
            if (text.includes('成功') || text.includes('完成') || text.includes('OK')) {
                line.classList.add('success');
            } else if (text.includes('错误') || text.includes('失败') || text.includes('Error')) {
                line.classList.add('error');
            } else {
                line.classList.add('info');
            }

            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function fetchLog() {
            try {
                const response = await fetch('/api/getFetchLog?offset=' + lineOffset);
                const result = await response.json();

                if (result.code === 200) {
                    const data = result.data;

                    // Update status
                    if (data.running) {
                        statusText.textContent = '正在更新数据...';
                        statusIndicator.style.background = '#28a745';
                    } else {
                        statusText.textContent = '更新已完成或尚未开始';
                        statusIndicator.style.background = '#6c757d';
                        statusIndicator.style.animation = 'none';
                    }

                    // Add new log lines
                    const logs = data.logs || [];
                    if (logs.length > 0) {
                        logs.forEach(line => addLogLine(line));
                        // Update offset for next request
                        lineOffset = data.totalLines;
                    }

                    // If offset was 0 (first load) and we got logs, scroll to bottom
                    if (lineOffset === logs.length && logs.length > 0) {
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                } else {
                    console.error('API error:', result.msg);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                statusText.textContent = '连接失败，正在重试...';
                statusIndicator.style.background = '#dc3545';
            }
        }

        // Initial load
        fetchLog();

        // Poll every 3 seconds
        setInterval(fetchLog, 3000);
    </script>
</body>
</html>
